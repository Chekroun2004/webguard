app = "webguard-worker"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile.worker.prod"

[processes]
  worker = "celery -A app.workers.celery_app worker --loglevel=info -B --include=app.workers.tasks.scan,app.workers.tasks.watchdog"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
