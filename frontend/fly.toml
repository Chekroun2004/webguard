app = "webguard-web"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile.prod"

[build.args]
  VITE_API_BASE_URL = "https://webguard-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
