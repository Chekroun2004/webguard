app = "webguard-api"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile.prod"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.checks]
    [http_service.checks.health]
      type = "http"
      interval = "30s"
      timeout = "5s"
      grace_period = "30s"
      method = "GET"
      path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
